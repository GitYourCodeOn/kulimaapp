// ── INBREEDING ─────────────────────────────────────────
const getLineage=(id,animals,depth=3,visited=new Set())=>{
  if(!id||depth===0||visited.has(id))return new Set();
  visited.add(id);
  const a=animals.find(x=>x.id===id);
  if(!a)return new Set();
  const s=new Set();
  [a.sireId,a.damId].filter(x=>x&&!x.startsWith('EXT_')).forEach(pid=>{
    s.add(pid);
    getLineage(pid,animals,depth-1,new Set(visited)).forEach(x=>s.add(x));
  });
  return s;
};
const getOffspring=(id,animals)=>animals.filter(a=>a.sireId===id||a.damId===id);
const inbreedingCheck=(maleId,femaleId,animals)=>{
  if(!maleId||!femaleId||maleId===femaleId)return null;
  const male=animals.find(a=>a.id===maleId),female=animals.find(a=>a.id===femaleId);
  if(!male||!female)return null;
  if(male.id===female.sireId||male.id===female.damId||female.id===male.sireId||female.id===male.damId)
    return{level:"critical",msg:"⛔ Parent–offspring pairing — do NOT breed."};
  const shS=male.sireId&&!male.sireId.startsWith('EXT_')&&male.sireId===female.sireId;
  const shD=male.damId&&!male.damId.startsWith('EXT_')&&male.damId===female.damId;
  if(shS&&shD)return{level:"critical",msg:"⛔ Full siblings — share both parents. Do NOT breed."};
  if(shS){const a=animals.find(x=>x.id===male.sireId);return{level:"critical",msg:`⛔ Half siblings — same sire (${a?.name||male.sireId}). Do NOT breed.`};}
  if(shD){const a=animals.find(x=>x.id===male.damId);return{level:"critical",msg:`⛔ Half siblings — same dam (${a?.name||male.damId}). Do NOT breed.`};}
  const mL=getLineage(maleId,animals,3),fL=getLineage(femaleId,animals,3);
  const common=[...mL].filter(id=>fL.has(id)).map(id=>animals.find(a=>a.id===id)).filter(Boolean);
  if(common.length>0)return{level:"warning",msg:`⚠️ ${common.length} common ancestor${common.length>1?"s":""} within 3 generations: ${common.map(a=>a.name).join(", ")}. Monitor carefully.`};
  return{level:"safe",msg:"✅ No close relatives within 3 generations — safe to breed."};
};

// ── CHARTS ────────────────────────────────────────────
const AreaChart=({data,dataKey,color="#166534",h=120,labelKey="day"})=>{
  const vals=data.map(d=>+d[dataKey]||0);
  const max=Math.max(...vals)||1,min=Math.min(...vals);
  const W=400,H=h,padL=8,padR=8,padT=14,padB=22;
  const iW=W-padL-padR,iH=H-padT-padB;
  const px=(i)=>padL+i*(iW/(vals.length-1||1));
  const py=(v)=>padT+iH-((v-min)/(max-min||1))*iH;
  const pts=vals.map((v,i)=>[px(i),py(v)]);
  const linePath=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const areaPath=`${linePath} L${pts[pts.length-1][0]},${padT+iH} L${pts[0][0]},${padT+iH} Z`;
  const gridVals=3;
  return<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
    <defs>
      <linearGradient id={`ag${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
        <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
      </linearGradient>
    </defs>
    {Array.from({length:gridVals},(_,i)=>{
      const y=padT+(i/(gridVals-1))*iH;
      return<line key={i} x1={padL} y1={y} x2={W-padR} y2={y} stroke="#e8ede8" strokeWidth="1" strokeDasharray="3,4"/>;
    })}
    <path d={areaPath} fill={`url(#ag${color.replace('#','')})`}/>
    <path d={linePath} stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill="#fff" stroke={color} strokeWidth="1.5"/>)}
    {data.map((d,i)=>{
      const lbl=d[labelKey]||"";
      if(data.length>8&&i%2!==0)return null;
      return<text key={i} x={px(i)} y={H-5} textAnchor="middle" fontSize="9" fill="#9ab49a" fontFamily="Inter,system-ui,sans-serif">{lbl}</text>;
    })}
  </svg>;
};

const BarChart=({data,keys=["v"],colors=["#166534","#86efac"],h=110,labelKey="m"})=>{
  const allVals=data.flatMap(d=>keys.map(k=>+d[k]||0));
  const max=Math.max(...allVals)||1;
  const W=400,H=h,padL=8,padR=8,padT=14,padB=20;
  const iW=W-padL-padR,iH=H-padT-padB;
  const grpW=iW/data.length,bW=Math.min(12,grpW/keys.length-3);
  return<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
    {[0.25,0.5,0.75,1].map((f,i)=>{
      const y=padT+iH*(1-f);
      return<line key={i} x1={padL} y1={y} x2={W-padR} y2={y} stroke="#f0f5f0" strokeWidth="1"/>;
    })}
    {data.map((d,i)=>keys.map((k,ki)=>{
      const v=+d[k]||0,bH=(v/max)*iH;
      const x=padL+i*grpW+(grpW-keys.length*(bW+3))/2+ki*(bW+3);
      const y=padT+iH-bH;
      return<g key={`${i}${ki}`}>
        <rect x={x} y={y} width={bW} height={Math.max(bH,1)} fill={colors[ki]||colors[0]} rx="3" opacity="0.88"/>
        {bH>12&&<text x={x+bW/2} y={y-3} textAnchor="middle" fontSize="8" fill={colors[ki]||colors[0]} fontFamily="Inter,system-ui,sans-serif" fontWeight="600">
          {v>999?Math.round(v/1000)+"k":v}
        </text>}
      </g>;
    }))}
    {data.map((d,i)=><text key={i} x={padL+i*grpW+grpW/2} y={H-4} textAnchor="middle" fontSize="9" fill="#9ab49a" fontFamily="Inter,system-ui,sans-serif">{d[labelKey]||""}</text>)}
    <line x1={padL} y1={padT+iH} x2={W-padR} y2={padT+iH} stroke="#e8ede8" strokeWidth="1"/>
  </svg>;
};

const DonutChart=({segments,size=72})=>{
  const total=segments.reduce((a,s)=>a+s.value,0)||1;
  const r=26,cx=36,cy=36,circ=2*Math.PI*r;
  let offset=0;
  return<svg width={size} height={size} viewBox="0 0 72 72">
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f0f5f0" strokeWidth="9"/>
    {segments.map((s,i)=>{
      const dash=(s.value/total)*circ,gap=circ-dash;
      const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="9"
        strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-offset}
        style={{transform:'rotate(-90deg)',transformOrigin:'36px 36px'}}/>;
      offset+=dash;return el;
    })}
    <circle cx={cx} cy={cy} r={20} fill="white"/>
  </svg>;
};

const Spark=({data,dataKey,color="#166534"})=>{
  const vals=data.map(d=>+d[dataKey]||0);
  const max=Math.max(...vals)||1,min=Math.min(...vals);
  const W=60,H=28;
  const px=(i)=>i*(W/(vals.length-1||1));
  const py=(v)=>H-2-((v-min)/(max-min||1))*(H-4);
  const pts=vals.map((v,i)=>[px(i),py(v)]);
  const line=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const area=`${line} L${pts[pts.length-1][0]},${H} L0,${H} Z`;
  return<svg viewBox={`0 0 ${W} ${H}`} style={{width:60,height:28,flexShrink:0}}>
    <defs><linearGradient id={`sp${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity="0.2"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
    </linearGradient></defs>
    <path d={area} fill={`url(#sp${color.replace('#','')})`}/>
    <path d={line} stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
};

const MainApp=({user,farmType,farmName})=>{
  const cfg=NAV_CONFIG[farmType]||NAV_CONFIG.dairy;
  const[tab,setTab]=useState("dashboard");
  const[cows,setCows]=useState(SEED_COWS);
  const[pigs,setPigs]=useState(SEED_PIGS);
  const[flocks,setFlocks]=useState(SEED_FLOCKS);
  const[birds,setBirds]=useState(SEED_BIRDS);
  const[fields,setFields]=useState(SEED_FIELDS);
  const[selCow,setSelCow]=useState(null);
  const[selPig,setSelPig]=useState(null);
  const[moreOpen,setMoreOpen]=useState(false);
  const bottomIds=cfg.bottom;
  const bottomTabs=cfg.tabs.filter(t=>bottomIds.includes(t.id));
  const moreTabs=cfg.tabs.filter(t=>!bottomIds.includes(t.id));
  const nav=(id)=>{setTab(id);setSelCow(null);setSelPig(null);setMoreOpen(false);};
  const tabLabel=cfg.tabs.find(t=>t.id===tab)?.label||(tab==="admin"?"Admin":"");

  const content=()=>{
    if(selCow&&tab==="herd")return<CowDetail cow={selCow} allCows={cows} onBack={()=>setSelCow(null)} onSelect={c=>setSelCow(c)}/>;
    if(selPig&&tab==="pigs")return<PigDetail pig={selPig} allPigs={pigs} onBack={()=>setSelPig(null)} onSelect={p=>setSelPig(p)}/>;
    if(farmType==="dairy"){
      if(tab==="dashboard")return<DairyDashboard cows={cows}/>;
      if(tab==="herd")return<HerdTab cows={cows} setCows={setCows} onSelect={c=>{setSelCow(c);}}/>;
      if(tab==="breeding")return<BreedingTabDairy cows={cows}/>;
      if(tab==="dairy")return<DairyOpsTab/>;
    }
    if(farmType==="pigs"){
      if(tab==="dashboard")return<PigDashboard pigs={pigs}/>;
      if(tab==="pigs")return<PigsTab pigs={pigs} setPigs={setPigs} onSelect={p=>{setSelPig(p);}}/>;
      if(tab==="breeding")return<BreedingTabPigs pigs={pigs}/>;
      if(tab==="production")return<ProductionTabPigs pigs={pigs}/>;
    }
    if(farmType==="chickens"){
      if(tab==="dashboard")return<ChickenDashboard flocks={flocks} birds={birds}/>;
      if(tab==="flocks")return<FlocksTab flocks={flocks} setFlocks={setFlocks}/>;
      if(tab==="breeders")return<BreedersTab birds={birds}/>;
      if(tab==="eggs")return<EggsTab/>;
    }
    if(farmType==="crops"){
      if(tab==="dashboard")return<CropsDashboard fields={fields}/>;
      if(tab==="fields")return<FieldsTab fields={fields} setFields={setFields}/>;
      if(tab==="planting")return<PlantingTab fields={fields}/>;
      if(tab==="harvest")return<HarvestTab/>;
      if(tab==="inputs")return<InputsTab/>;
    }
    if(tab==="health")return<HealthTab type={farmType}/>;
    if(tab==="reports")return<ReportsTab/>;
    if(tab==="weather")return<WeatherTab/>;
    if(tab==="documents")return<DocumentsTab/>;
    if(tab==="finance")return<FinanceTab/>;
    if(tab==="admin")return<AdminTab user={user}/>;
    return<div style={{textAlign:'center',padding:40,color:'#9ab49a'}}>Select a tab to get started</div>;
  };

  return<div className="main-wrap">
    {/* ── SIDEBAR (desktop) */}
    <nav className="sidebar">
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid #f0f5f0'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontSize:22}}>🌾</span>
          <span style={{fontWeight:800,fontSize:16,letterSpacing:'-0.02em',color:'#0f1f0f'}}>FarmFlow</span>
        </div>
        <p style={{fontSize:12,color:'#9ab49a',marginBottom:6}}>{farmName||"My Farm"}</p>
        <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:6,background:'#f0fdf4',color:'#166534',border:'1px solid #b6e8c4'}}>{farmType}</span>
      </div>
      <div style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
        {cfg.tabs.map(t=><button key={t.id} className={`nav-item ${tab===t.id?"active":""}`} onClick={()=>nav(t.id)}>
          <span className="nav-icon">{t.icon}</span><span>{t.label}</span>
        </button>)}
        {user?.role==="superuser"&&<>
          <div style={{height:1,background:'#f0f5f0',margin:'8px 4px'}}/>
          <button className={`nav-item ${tab==="admin"?"active":""}`} onClick={()=>nav("admin")}>
            <span className="nav-icon">⚙</span><span>Admin</span>
          </button>
        </>}
      </div>
      <div style={{padding:'12px 14px',borderTop:'1px solid #f0f5f0',display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:30,height:30,borderRadius:'50%',background:'#166534',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,flexShrink:0}}>{user?.email?.[0]?.toUpperCase()||"U"}</div>
        <div style={{flex:1,minWidth:0}}><p style={{fontSize:12,fontWeight:600,color:'#0f1f0f',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.email||"User"}</p><p style={{fontSize:11,color:'#9ab49a'}}>{user?.role}</p></div>
      </div>
    </nav>

    {/* ── CONTENT */}
    <div>
      <div className="topbar">
        <div>
          <h1 style={{fontWeight:700,fontSize:15,letterSpacing:'-0.01em',color:'#0f1f0f'}}>{tabLabel}</h1>
          <p style={{fontSize:11,color:'#9ab49a'}}>{farmName||"My Farm"}</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button style={{width:32,height:32,borderRadius:'50%',background:'#f5faf5',border:'1px solid #e8ede8',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',fontSize:15}}>
            🔔<span style={{position:'absolute',top:4,right:4,width:7,height:7,background:'#dc2626',borderRadius:'50%',border:'1.5px solid #fff'}}/>
          </button>
          <div style={{width:32,height:32,borderRadius:'50%',background:'#166534',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13}}>{user?.email?.[0]?.toUpperCase()||"U"}</div>
        </div>
      </div>
      <div style={{padding:'18px 18px 96px'}}>{content()}</div>
    </div>

    {/* ── BOTTOM NAV (mobile) */}
    <div className="bottom-nav">
      {bottomTabs.map(t=><button key={t.id} className={`bnav-item ${tab===t.id?"active":""}`} onClick={()=>nav(t.id)}>
        <span className="bnav-icon">{t.icon}</span><span>{t.label}</span>
      </button>)}
      <div style={{position:'relative',flex:1}}>
        <button className={`bnav-item ${moreOpen?"active":""}`} style={{width:'100%'}} onClick={()=>setMoreOpen(!moreOpen)}>
          <span className="bnav-icon">⋯</span><span>More</span>
        </button>
        {moreOpen&&<div style={{position:'absolute',bottom:'calc(100% + 4px)',right:0,width:180,background:'#fff',borderRadius:12,boxShadow:'0 8px 32px rgba(0,0,0,0.14)',border:'1px solid #e8ede8',overflow:'hidden',zIndex:50}}>
          {moreTabs.map(t=><button key={t.id} onClick={()=>nav(t.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'10px 14px',fontSize:13,fontWeight:500,background:'none',border:'none',cursor:'pointer',color:'#374151',fontFamily:'Inter,system-ui,sans-serif',textAlign:'left'}}>
            <span style={{fontSize:15}}>{t.icon}</span><span>{t.label}</span>
          </button>)}
          {user?.role==="superuser"&&<button onClick={()=>nav("admin")} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'10px 14px',fontSize:13,fontWeight:500,background:'none',border:'none',borderTop:'1px solid #f0f5f0',cursor:'pointer',color:'#374151',fontFamily:'Inter,system-ui,sans-serif',textAlign:'left'}}>
            <span style={{fontSize:15}}>⚙</span><span>Admin</span>
          </button>}
        </div>}
      </div>
    </div>
  </div>;
};

// ── ROOT ──────────────────────────────────────────────
const App=()=>{
  const[screen,setScreen]=useState("login");
  const[user,setUser]=useState(null);
  const[farmType,setFarmType]=useState("dairy");
  const[farmName,setFarmName]=useState("Green Meadows Farm");
  if(screen==="login")return<LoginScreen onLogin={u=>{setUser(u);setScreen("onboarding");}}/>;
  if(screen==="onboarding")return<OnboardingWizard onComplete={({farmType:ft,farmName:fn})=>{setFarmType(ft||"dairy");setFarmName(fn||"My Farm");setScreen("app");}}/>;
  return<MainApp user={user} farmType={farmType} farmName={farmName}/>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
